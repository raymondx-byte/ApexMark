name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/release.keystore"

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_PASSWORD" && test -n "$KEY_ALIAS" && test -n "$KEY_PASSWORD"
          cat > keystore.properties <<EOF
          storeFile=${GITHUB_WORKSPACE}/release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Match tag to app versionName
        run: |
          set -euo pipefail
          chmod +x gradlew
          TAG_VER="${GITHUB_REF_NAME#v}"
          APP_VER="$(./gradlew :app:printVersionName --console=plain -q | tail -n1 | tr -d '\r')"
          echo "Git tag version: $TAG_VER"
          echo "app/build.gradle.kts versionName: $APP_VER"
          test "$TAG_VER" = "$APP_VER"

      - name: Assemble branded release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:brandReleaseApk --no-daemon --stacktrace

      - name: SHA-256 and release notes
        id: asset
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          APK="ApexMark.${VERSION}.apk"
          APK_PATH="app/build/outputs/apk/release/${APK}"
          test -f "$APK_PATH"
          sha256sum "$APK_PATH" | tee SHA256SUMS.txt
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK" >> "$GITHUB_OUTPUT"
          {
            echo "## ApexMark ${VERSION}"
            echo ""
            echo "Android **Markdown / 剪贴板** 轻量工具；本包为 **release** 签名构建。"
            echo ""
            echo "- **安装包**: \`${APK}\`"
            echo "- **提交**: [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})（标签 \`${TAG}\`）"
            echo ""
            echo "### SHA-256"
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
            echo ""
            echo "> 校验（APK 与 \`SHA256SUMS.txt\` 同目录）：\`sha256sum -c SHA256SUMS.txt\`"
          } > release_notes.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "ApexMark ${{ github.ref_name }}"
          files: |
            ${{ steps.asset.outputs.apk_path }}
            SHA256SUMS.txt
          body_path: release_notes.md
