name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/release.keystore"

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_PASSWORD" && test -n "$KEY_ALIAS" && test -n "$KEY_PASSWORD"
          cat > keystore.properties <<EOF
          storeFile=${GITHUB_WORKSPACE}/release.keystore
          storePassword=${KEYSTORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Assemble release
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Rename APK and checksum
        id: asset
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SRC="$(ls app/build/outputs/apk/release/*.apk | head -n1)"
          DEST="ApexMark.${VERSION}.apk"
          cp "$SRC" "$DEST"
          sha256sum "$DEST" | tee SHA256SUMS.txt
          echo "apk=$DEST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Release notes
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          APK="${{ steps.asset.outputs.apk }}"
          {
            echo "## ApexMark ${VERSION}"
            echo ""
            echo "Android **Markdown / 剪贴板** 轻量工具；本包为 **release** 签名构建。"
            echo ""
            echo "- **安装包**: \`${APK}\`（下载列表中的文件名即此）"
            echo "- **提交**: [\`${{ github.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})（标签 \`${TAG}\`）"
            echo ""
            echo "### SHA-256"
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
            echo ""
            echo "> 校验：\`sha256sum -c SHA256SUMS.txt\`（需与 APK 同目录）"
          } > release_notes.md

      - uses: softprops/action-gh-release@v2
        with:
          name: "ApexMark ${{ github.ref_name }}"
          files: |
            ${{ steps.asset.outputs.apk }}
            SHA256SUMS.txt
          body_path: release_notes.md
